<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration System</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Studentu Registravimo Sistema</h1>
      <p></p>
      <nav>
        <a href="students.html">See all registered students</a>
      </nav>
    </header>

    <main>
      <section id="registration-form">
        <form id="student-form">
          <label for="student-name">Student Name:</label>
          <input
            type="text"
            id="student-name"
            placeholder="vardas pavarde"
            required
          />

          <label for="student-id">Student ID:</label>
          <input type="number" id="student-id" placeholder="ID" required />

          <label for="mokomas-dalykas">Mokomas Dalykas:</label>
          <input
            type="text"
            id="mokomas-dalykas"
            placeholder="mokomas dalykas"
            required
          />

          <label for="kursas">Kursas:</label>
          <input type="text" id="kursas" placeholder="kursas" required />

          <label for="email-id">Email:</label>
          <input type="email" id="email-id" placeholder="email" required />

          <label for="contact-no">Contact Number:</label>
          <input
            type="tel"
            id="contact-no"
            placeholder="contact number"
            required
          />

          <button type="submit">Register</button>
          <button type="button" id="cancel-button" style="display: none">
            Cancel
          </button>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
